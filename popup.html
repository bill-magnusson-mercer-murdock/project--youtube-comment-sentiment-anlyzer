<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Sentiment Analyzer</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      width: 380px;
      padding: 20px;
      border-radius: 12px;
    }

    h3 {
      color: #ff4d4d;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 16px;
      background: linear-gradient(135deg, #ff0000, #cc0000);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s ease;
      margin-bottom: 10px;
    }

    button:hover {
      background: linear-gradient(135deg, #ff4d4d, #b30000);
    }

    #result {
      margin-top: 15px;
      background-color: #1e1e1e;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 8px rgba(255, 0, 0, 0.15);
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    .spinner {
      border: 4px solid #333;
      border-top: 4px solid #ff4d4d;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .summary p {
      margin: 5px 0;
      font-size: 14px;
    }

    .controversy {
      margin-top: 12px;
      font-weight: 600;
      color: #ff8080;
      text-align: center;
    }

    .gauge-container {
      background-color: #2a2a2a;
      border-radius: 10px;
      height: 10px;
      width: 100%;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .gauge-bar {
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s ease;
    }
  </style>
</head>
<body>
  <h3>YouTube Sentiment Analyzer</h3>
  <button id="analyzeBtn">Analyze Current Video</button>
  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
